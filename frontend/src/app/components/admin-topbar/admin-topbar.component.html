<header class="admin-topbar">
  <div class="topbar-left">

    <div class="breadcrumb-nav">
      <span class="breadcrumb-root">Admin</span>
      <svg class="breadcrumb-sep" width="20" height="20" viewBox="0 0 16 16" fill="none">
        <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="breadcrumb-current">{{ pageTitle }}</span>
    </div>
  </div>

  <div class="topbar-right">
    <!-- Search -->
    <div class="topbar-search" (click)="searchInput.focus()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input #searchInput type="text" placeholder="Search..." class="search-input" 
             [value]="searchQuery"
             (input)="onSearch($any($event.target).value)"
             (focus)="showResults = searchResults.length > 0">
      
      <!-- Dropdown Results -->
      <div class="search-dropdown" *ngIf="showResults && searchResults.length > 0">
        <div class="search-item" *ngFor="let res of searchResults" (click)="selectResult(res)">
          <div class="search-item-icon-wrap">
            <i class="bi {{ res.icon }}"></i>
          </div>
          <span class="search-item-label">{{ res.label }}</span>
        </div>
      </div>
    </div>

    <!-- Notification bell -->
    <button class="topbar-icon-btn" aria-label="Notifications" routerLink="/admin/notifications">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      <span class="notification-dot" *ngIf="unreadCount === 0"></span>
    </button>
  </div>
</header>
