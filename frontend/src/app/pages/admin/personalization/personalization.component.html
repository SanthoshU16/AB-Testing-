<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">Personalization</h2>
    <p class="page-subtitle">Customize the look and feel of your Armor Bridge dashboard.</p>
  </div>

  <div class="card">
    <h3 class="section-title">Theme Preferences</h3>
    <p class="section-desc">Choose your preferred visual theme for the admin portal.</p>
    
    <div class="theme-options">
      <div class="theme-card active">
        <div class="theme-preview light">
          <div class="tp-header"></div>
          <div class="tp-sidebar"></div>
        </div>
        <span class="theme-name">Light Mode</span>
      </div>
      <div class="theme-card">
        <div class="theme-preview dark">
          <div class="tp-header"></div>
          <div class="tp-sidebar"></div>
        </div>
        <span class="theme-name">Dark Mode</span>
      </div>
      <div class="theme-card">
        <div class="theme-preview auto">
          <div class="tp-header"></div>
          <div class="tp-sidebar"></div>
        </div>
        <span class="theme-name">System Auto</span>
      </div>
    </div>

    <div class="form-actions mt-4">
      <button class="btn-primary">Save Preferences</button>
    </div>
  </div>
</div>
