<div class="apple-auth-layout">
  <div class="apple-auth-content">
    <div class="apple-back-wrapper">
      <a routerLink="/" class="apple-back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        <span>Back</span>
      </a>
    </div>
    <div class="apple-auth-container">
      
      <div class="apple-auth-header">
      <img src="ABLM.png" alt="Armor Bridz" class="apple-logo">
      <h1 class="apple-title">Sign in</h1>
      <p class="apple-subtitle">Sign in to your Armor Bridz account.</p>
    </div>

    <!-- Error Message -->
    <div class="auth-error" *ngIf="errorMessage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form class="apple-form" (ngSubmit)="onSignIn()">
      <!-- Apple style joined inputs -->
      <div class="apple-input-group">
        <div class="apple-input-row">
          <input type="email" class="apple-input" placeholder="Work Email" required autofocus
                 [(ngModel)]="email" name="email" id="sign-in-email">
        </div>
        <div class="apple-input-divider"></div>
        <div class="apple-input-row">
          <input [type]="showPassword ? 'text' : 'password'" class="apple-input" placeholder="Password" required
                 [(ngModel)]="password" name="password" id="sign-in-password">
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" aria-label="Toggle password visibility">
            <!-- Eye Output -->
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <!-- Eye-off Output -->
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="apple-options">
        <label class="apple-checkbox">
          <input type="checkbox"> 
          <span>Remember me</span>
        </label>
      </div>

      <button type="submit" class="apple-btn-submit-wide" [disabled]="isSubmitting" id="sign-in-submit">
        <span *ngIf="!isSubmitting">Continue</span>
        <span *ngIf="isSubmitting" class="btn-spinner"></span>
      </button>

      <div class="apple-links">
        <a href="#" class="apple-link">Forgotten your password?</a>
        <a routerLink="/sign-up" class="apple-link">Create yours now.</a>
      </div>

      <div class="apple-divider">
        <span>or</span>
      </div>

      <div class="apple-oauth-grid">
        <button type="button" class="apple-oauth-btn" title="Google" (click)="onGoogleSignIn()" id="google-sign-in">
          <svg class="oauth-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>
        <button type="button" class="apple-oauth-btn" title="Microsoft">
          <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M11.4 1H0V11.4H11.4V1Z" fill="#F25022"/>
            <path d="M24 1H12.6V11.4H24V1Z" fill="#7FBA00"/>
            <path d="M11.4 12.6H0V24H11.4V12.6Z" fill="#00A4EF"/>
            <path d="M24 12.6H12.6V24H24V12.6Z" fill="#FFB900"/>
          </svg>
        </button>
        <button type="button" class="apple-oauth-btn" title="Apple">
          <svg class="oauth-icon" viewBox="0 0 384 512" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
          </svg>
        </button>
      </div>

    </form>
  </div>
</div>
</div>
