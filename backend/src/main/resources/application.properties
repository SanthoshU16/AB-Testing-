# Application Config
server.port=${PORT:8080}

# Firebase Config
# Set the path to your service account JSON file here
armorbridge.firebase.config-path=classpath:firebase-service-account.json

# ── Email / SMTP Config ──────────────────────────────────────
# Using Gmail SMTP with App Password (generate at https://myaccount.google.com/apppasswords)
# Replace with your own credentials or use SendGrid/Mailgun in production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Platform Config ──────────────────────────────────────────
# Base URL for phishing simulation links (frontend URL)
armorbridge.platform.base-url=${PLATFORM_BASE_URL:http://localhost:4200}
# Default sender name for phishing emails
armorbridge.platform.default-sender=Armor Bridz Simulation
